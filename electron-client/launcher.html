<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cromulent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .server-icon {
            transition: border-radius 0.2s ease, background-color 0.2s ease;
        }
        .server-icon:hover {
            border-radius: 0.75rem;
            background-color: #6366f1;
        }

        body { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <!-- Main layout -->
    <div class="flex flex-1 min-h-0">

        <!-- Sidebar -->
        <div class="w-[72px] bg-gray-950 flex flex-col items-center py-3 gap-2 flex-shrink-0">
            <div id="server-icons" class="flex flex-col items-center gap-2 overflow-y-auto flex-1 w-full px-2">
                <!-- Server icons rendered by JS -->
            </div>
            <div class="w-8 h-[2px] bg-gray-700 rounded-full my-1"></div>
            <button id="add-server-btn"
                class="server-icon w-12 h-12 rounded-full bg-gray-800 text-green-400 flex items-center justify-center text-2xl font-light hover:text-white cursor-pointer"
                title="Add Server">
                +
            </button>
        </div>

        <!-- Content area -->
        <div class="flex-1 bg-gray-800 flex flex-col min-h-0 relative">
            <div id="content" class="flex-1 overflow-y-auto p-8">
                <!-- Content rendered by JS -->
            </div>
            <webview id="server-webview" class="hidden absolute inset-0 w-full h-full"></webview>
        </div>
    </div>

    <!-- Right-click context menu -->
    <div id="context-menu" class="hidden fixed z-50 bg-gray-900 border border-gray-700 rounded-lg shadow-xl py-1 min-w-[160px]">
        <button id="ctx-remove" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-gray-800 cursor-pointer">
            Remove Server
        </button>
    </div>

    <!-- Bottom bar -->
    <div class="h-12 bg-gray-950 border-t border-gray-700 flex items-center justify-between px-4 flex-shrink-0">
        <div class="flex items-center gap-2">
            <span id="ptt-dot" class="w-2.5 h-2.5 rounded-full bg-gray-600"></span>
            <span id="ptt-label" class="text-sm text-gray-400">PTT: Off</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="ptt-key" class="text-sm text-gray-500">Left Ctrl</span>
            <button id="settings-btn" title="Settings"
                class="text-gray-500 hover:text-gray-300 transition-colors cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/60" id="settings-backdrop"></div>
        <div class="relative bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md mx-4 p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-white">Settings</h2>
                <button id="settings-close" class="text-gray-500 hover:text-gray-300 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- PTT Key -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">Push-to-Talk Key</label>
                <button id="ptt-key-btn"
                    class="w-full text-left bg-gray-800 border border-gray-600 text-white text-sm rounded-lg px-3 py-2.5 hover:border-indigo-500 focus:outline-none focus:border-indigo-500 transition-colors cursor-pointer">
                    <span id="ptt-key-display">Left Ctrl</span>
                </button>
                <p id="ptt-key-hint" class="mt-1.5 text-xs text-gray-500">Click to rebind — then press any key</p>
            </div>

            <!-- PTT Device (Linux only) -->
            <div id="ptt-device-section" class="mb-6 hidden">
                <label class="block text-sm font-medium text-gray-300 mb-2">PTT Input Device</label>
                <div class="flex gap-2">
                    <select id="ptt-device-select"
                        class="flex-1 bg-gray-800 border border-gray-600 text-white text-sm rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-500">
                        <option value="">Auto-detect</option>
                    </select>
                    <button id="ptt-device-refresh" title="Refresh devices"
                        class="bg-gray-800 border border-gray-600 text-gray-400 hover:text-white rounded-lg px-3 py-2.5 hover:border-gray-500 transition-colors cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
                <p class="mt-1.5 text-xs text-gray-500">Linux only — choose a specific keyboard or use auto-detect</p>
            </div>

            <div class="flex gap-3 justify-end">
                <button id="settings-cancel"
                    class="px-4 py-2 text-sm text-gray-300 bg-gray-800 hover:bg-gray-700 rounded-lg cursor-pointer transition-colors">
                    Cancel
                </button>
                <button id="settings-save"
                    class="px-4 py-2 text-sm text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg cursor-pointer transition-colors">
                    Save
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <script src="auth-manager.js"></script>
    <script src="launcher.js"></script>
</body>
</html>
